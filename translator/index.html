<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Translator · Internship Task</title>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    /* ---------- style.css ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #f6f9fc 0%, #e9f1f8 100%);
      padding: 1.5rem;
    }

    .translator-card {
      max-width: 820px;
      width: 100%;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 2.2rem 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 20, 30, 0.25),
                  inset 0 1px 2px rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.5);
      transition: all 0.2s ease;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #0b1e2b;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.8rem;
    }

    h1 i {
      color: #2a7de1;
      font-size: 2rem;
      background: rgba(42, 125, 225, 0.12);
      padding: 0.4rem;
      border-radius: 18px;
    }

    .language-selector {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.8rem 1rem;
      margin-bottom: 1.8rem;
      background: rgba(255, 255, 255, 0.5);
      padding: 0.8rem 1.2rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    .lang-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 1 1 auto;
    }

    .lang-group label {
      font-weight: 500;
      color: #1e3a5f;
      font-size: 0.85rem;
      letter-spacing: 0.3px;
      opacity: 0.7;
    }

    .lang-group select {
      background: white;
      border: 1px solid #dce5ed;
      border-radius: 40px;
      padding: 0.5rem 1.2rem 0.5rem 1rem;
      font-size: 0.95rem;
      font-weight: 500;
      color: #0b2a41;
      cursor: pointer;
      outline: none;
      transition: 0.2s;
      min-width: 130px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }

    .lang-group select:hover {
      border-color: #2a7de1;
      background: #fafcff;
    }

    .swap-btn {
      background: white;
      border: 1px solid #d0dde9;
      border-radius: 40px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      color: #1e4a76;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      flex-shrink: 0;
    }

    .swap-btn:hover {
      background: #eef5fe;
      border-color: #2a7de1;
      color: #0b2a41;
      transform: rotate(180deg);
    }

    .text-areas {
      display: flex;
      flex-direction: row;
      gap: 1.2rem;
      margin-bottom: 1.8rem;
    }

    .text-box {
      flex: 1;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(4px);
      border-radius: 28px;
      padding: 1.2rem 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
      transition: 0.2s;
    }

    .text-box:focus-within {
      border-color: #2a7de1;
      box-shadow: 0 0 0 4px rgba(42, 125, 225, 0.15);
      background: white;
    }

    .text-box label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #3f5e7a;
      margin-bottom: 0.4rem;
      font-weight: 600;
      opacity: 0.6;
    }

    .text-box textarea {
      width: 100%;
      border: none;
      background: transparent;
      resize: vertical;
      font-size: 1.1rem;
      line-height: 1.6;
      color: #0b1e2b;
      outline: none;
      min-height: 140px;
      font-weight: 450;
      padding: 0;
    }

    .text-box textarea::placeholder {
      color: #9bb1c7;
      font-weight: 350;
    }

    .text-box textarea:disabled {
      color: #1e3a5f;
      opacity: 0.9;
    }

    .action-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 0.2rem;
    }

    .translate-btn {
      background: #1a4b7a;
      border: none;
      padding: 0.9rem 2.8rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      color: white;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 8px 18px -6px rgba(20, 70, 120, 0.3);
      border: 1px solid rgba(255,255,255,0.2);
      letter-spacing: 0.3px;
    }

    .translate-btn:hover {
      background: #0f3b60;
      transform: scale(0.98);
      box-shadow: 0 4px 12px -4px rgba(20, 70, 120, 0.4);
    }

    .translate-btn i {
      font-size: 1rem;
    }

    .copy-btn {
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid #d0dde9;
      padding: 0.7rem 1.5rem;
      border-radius: 60px;
      font-weight: 500;
      color: #1e3a5f;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      transition: 0.2s;
      backdrop-filter: blur(4px);
      font-size: 0.9rem;
    }

    .copy-btn:hover {
      background: white;
      border-color: #2a7de1;
      color: #0b2a41;
    }

    .copy-btn i {
      font-size: 0.9rem;
    }

    .char-counter {
      font-size: 0.8rem;
      color: #5b7895;
      background: rgba(255,255,255,0.4);
      padding: 0.2rem 1rem;
      border-radius: 40px;
      font-weight: 450;
      letter-spacing: 0.2px;
    }

    .footer-note {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #5e7b98;
      text-align: center;
      border-top: 1px solid rgba(0,0,0,0.04);
      padding-top: 1.2rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .footer-note span i {
      margin-right: 0.3rem;
      opacity: 0.6;
    }

    /* responsive */
    @media (max-width: 640px) {
      .translator-card {
        padding: 1.5rem;
      }
      .text-areas {
        flex-direction: column;
        gap: 1rem;
      }
      .language-selector {
        flex-direction: column;
        align-items: stretch;
        border-radius: 32px;
        padding: 1rem;
        gap: 0.8rem;
      }
      .swap-btn {
        align-self: center;
        width: 40px;
        height: 40px;
      }
      .lang-group {
        flex-wrap: wrap;
      }
      .lang-group select {
        flex: 1;
        min-width: 100px;
      }
      .action-bar {
        flex-direction: column;
        align-items: stretch;
      }
      .translate-btn {
        justify-content: center;
      }
      .copy-btn {
        justify-content: center;
      }
    }

    /* small status */
    .status-toast {
      background: #0b2a41;
      color: white;
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
      font-size: 0.8rem;
      opacity: 0;
      transition: 0.2s;
      pointer-events: none;
    }
    .status-toast.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <!-- index.html -->
  <div class="translator-card">
    <h1>
      <i class="fas fa-language"></i> 
      LangBridge
    </h1>

    <div class="language-selector">
      <div class="lang-group">
        <label><i class="fas fa-arrow-right"></i> From</label>
        <select id="sourceLang">
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
          <option value="ru">Russian</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="zh">Chinese (Simplified)</option>
          <option value="ar">Arabic</option>
          <option value="hi">Hindi</option>
        </select>
      </div>

      <button class="swap-btn" id="swapLangBtn" aria-label="Swap languages">
        <i class="fas fa-arrow-right-arrow-left"></i>
      </button>

      <div class="lang-group">
        <label><i class="fas fa-arrow-left"></i> To</label>
        <select id="targetLang">
          <option value="es">Spanish</option>
          <option value="en" selected>English</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
          <option value="ru">Russian</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="zh">Chinese (Simplified)</option>
          <option value="ar">Arabic</option>
          <option value="hi">Hindi</option>
        </select>
      </div>
    </div>

    <div class="text-areas">
      <div class="text-box">
        <label for="sourceText"><i class="far fa-pen-to-square"></i> Input</label>
        <textarea id="sourceText" placeholder="Enter text to translate…" rows="4">Hello, how are you?</textarea>
        <div style="display: flex; justify-content: flex-end; margin-top: 0.2rem;">
          <span class="char-counter" id="charCount">0 / 500</span>
        </div>
      </div>

      <div class="text-box">
        <label for="translatedText"><i class="fas fa-check-circle"></i> Translation</label>
        <textarea id="translatedText" placeholder="Translation will appear here" rows="4" disabled></textarea>
        <div style="display: flex; justify-content: flex-end; margin-top: 0.2rem;">
          <span class="status-toast" id="statusToast"><i class="fas fa-circle-check"></i> Copied!</span>
        </div>
      </div>
    </div>

    <div class="action-bar">
      <button class="translate-btn" id="translateBtn">
        <i class="fas fa-arrow-right-to-bracket"></i> Translate
      </button>
      <div style="display: flex; gap: 0.7rem; flex-wrap: wrap;">
        <button class="copy-btn" id="copyBtn">
          <i class="fas fa-copy"></i> Copy
        </button>
        <button class="copy-btn" id="clearBtn" style="background: rgba(255,230,230,0.5); border-color: #e8d0d0;">
          <i class="fas fa-eraser"></i> Clear
        </button>
      </div>
    </div>

    <div class="footer-note">
      <span><i class="fas fa-globe"></i> Powered by MyMemory API (demo)</span>
      <span><i class="fas fa-code"></i> Internship task · Language-Translator</span>
    </div>
  </div>

  <!-- script.js -->
  <script>
    (function() {
      "use strict";

      // DOM refs
      const sourceLangSelect = document.getElementById('sourceLang');
      const targetLangSelect = document.getElementById('targetLang');
      const sourceText = document.getElementById('sourceText');
      const translatedText = document.getElementById('translatedText');
      const translateBtn = document.getElementById('translateBtn');
      const swapBtn = document.getElementById('swapLangBtn');
      const copyBtn = document.getElementById('copyBtn');
      const clearBtn = document.getElementById('clearBtn');
      const charCount = document.getElementById('charCount');
      const statusToast = document.getElementById('statusToast');

      // max chars
      const MAX_CHARS = 500;

      // update character counter
      function updateCharCounter() {
        const len = sourceText.value.length;
        charCount.textContent = `${len} / ${MAX_CHARS}`;
        if (len > MAX_CHARS) {
          charCount.style.color = '#c73b3b';
        } else {
          charCount.style.color = '#5b7895';
        }
      }

      // trim text if exceeds max
      function enforceMaxChars() {
        if (sourceText.value.length > MAX_CHARS) {
          sourceText.value = sourceText.value.slice(0, MAX_CHARS);
          updateCharCounter();
        }
      }

      sourceText.addEventListener('input', function() {
        enforceMaxChars();
        updateCharCounter();
      });

      // ----- TRANSLATE using MyMemory (free, no API key required) -----
      async function translateText(text, sourceLang, targetLang) {
        if (!text || text.trim() === '') {
          return '';
        }

        // MyMemory API endpoint (public, no key)
        const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceLang}|${targetLang}`;

        try {
          const response = await fetch(url);
          if (!response.ok) {
            throw new Error(`HTTP error ${response.status}`);
          }
          const data = await response.json();
          // MyMemory returns responseData.translatedText
          if (data.responseData && data.responseData.translatedText) {
            return data.responseData.translatedText;
          } else {
            console.warn('MyMemory response:', data);
            return '[Translation not available]';
          }
        } catch (error) {
          console.error('Translation error:', error);
          // fallback: use a dummy translation for demo (so it works offline)
          if (sourceLang === 'en' && targetLang === 'es') {
            return 'Hola, ¿cómo estás? (demo)';
          } else if (sourceLang === 'es' && targetLang === 'en') {
            return 'Hello, how are you? (demo)';
          } else {
            return `[Demo] ${text} (${sourceLang}→${targetLang})`;
          }
        }
      }

      // main translate action
      async function performTranslation() {
        const text = sourceText.value.trim();
        if (!text) {
          translatedText.value = 'Please enter some text.';
          return;
        }

        const source = sourceLangSelect.value;
        const target = targetLangSelect.value;

        // show loading state
        translateBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Translating…';
        translateBtn.disabled = true;

        try {
          const result = await translateText(text, source, target);
          translatedText.value = result;
        } catch (err) {
          translatedText.value = '⚠️ Error during translation.';
          console.error(err);
        } finally {
          translateBtn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> Translate';
          translateBtn.disabled = false;
        }
      }

      // event: translate button
      translateBtn.addEventListener('click', performTranslation);

      // event: swap languages
      function swapLanguages() {
        const src = sourceLangSelect.value;
        const tgt = targetLangSelect.value;
        sourceLangSelect.value = tgt;
        targetLangSelect.value = src;

        // also swap text if both have content
        const srcText = sourceText.value;
        const tgtText = translatedText.value;
        // only swap if translation is not empty or placeholder
        if (tgtText && !tgtText.includes('Please enter') && !tgtText.includes('Error')) {
          sourceText.value = tgtText;
          translatedText.value = srcText;
          updateCharCounter();
        } else {
          // just swap the text areas
          sourceText.value = tgtText;
          translatedText.value = srcText;
          updateCharCounter();
        }
        // clear any toast
        statusToast.classList.remove('show');
      }

      swapBtn.addEventListener('click', swapLanguages);

      // event: copy translation
      function copyTranslation() {
        const text = translatedText.value;
        if (!text || text === '' || text.includes('Please enter') || text.includes('Error')) {
          statusToast.textContent = '⚠️ Nothing to copy';
          statusToast.classList.add('show');
          setTimeout(() => statusToast.classList.remove('show'), 1500);
          return;
        }

        navigator.clipboard.writeText(text).then(() => {
          statusToast.textContent = '✅ Copied!';
          statusToast.classList.add('show');
          setTimeout(() => statusToast.classList.remove('show'), 1800);
        }).catch(() => {
          // fallback
          translatedText.select();
          document.execCommand('copy');
          statusToast.textContent = '✅ Copied!';
          statusToast.classList.add('show');
          setTimeout(() => statusToast.classList.remove('show'), 1800);
        });
      }

      copyBtn.addEventListener('click', copyTranslation);

      // event: clear
      function clearAll() {
        sourceText.value = '';
        translatedText.value = '';
        updateCharCounter();
        statusToast.classList.remove('show');
        sourceText.focus();
      }

      clearBtn.addEventListener('click', clearAll);

      // initial character counter
      updateCharCounter();

      // auto-translate on load with default text
      window.addEventListener('load', function() {
        // small delay to let everything render
        setTimeout(() => {
          performTranslation();
        }, 200);
      });

      // optional: translate on language change (if user wants)
      sourceLangSelect.addEventListener('change', function() {
        if (sourceText.value.trim() !== '') {
          performTranslation();
        }
      });
      targetLangSelect.addEventListener('change', function() {
        if (sourceText.value.trim() !== '') {
          performTranslation();
        }
      });

      // extra: Ctrl+Enter shortcut
      sourceText.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
          e.preventDefault();
          performTranslation();
        }
      });

    })();
  </script>
</body>
</html>
